<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 – Seite nicht gefunden | Raumdock</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <style>
    @font-face{font-family:"RDOC Display";src:url("/assets/BebasNeue-Regular.ttf") format("truetype");font-weight:400;font-style:normal;font-display:swap}
    :root{--bg:#04060a; --fg:#c8dce8; --muted:rgba(200,220,232,.58); --cyan:#00d4ff; --gold:#f0a500; --bd:rgba(0,212,255,.22); --font-ui:"Segoe UI","Arial Narrow",system-ui,sans-serif; --font-display:"RDOC Display","Arial Narrow",Impact,sans-serif; --font-tech:Consolas,"Cascadia Mono","Lucida Console",monospace}
    *{box-sizing:border-box}
    body{margin:0; min-height:100svh; display:grid; place-items:center; background:radial-gradient(760px 420px at 50% -10%,rgba(0,212,255,.12),transparent 60%),var(--bg); color:var(--fg); font-family:var(--font-ui)}
    body::after{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.018) 3px,rgba(0,212,255,.018) 4px)}
    .wrap{max-width:720px; padding:32px 20px; text-align:center}
    h1{font-family:var(--font-display);font-size:54px; line-height:1; margin:0 0 8px;color:var(--cyan);letter-spacing:1.2px;text-transform:uppercase}
    p{color:var(--muted)}
    .btn{display:inline-block; margin-top:18px; padding:10px 16px; text-decoration:none; color:var(--gold); border:1px solid rgba(240,165,0,.4); background:rgba(240,165,0,.06); font-family:var(--font-tech);font-size:11px;letter-spacing:1px;text-transform:uppercase}
    .btn:hover{background:rgba(240,165,0,.12)}
    .art{opacity:.28; width:min(60vw,520px); margin:0 auto 10px; display:block;filter:drop-shadow(0 0 26px rgba(0,212,255,.18))}
  </style>
</head>
<body>
  <main class="wrap">
    <img class="art" src="/assets/astronaut-wolf.png" alt="Astronaut Wolf" />
    <h1>Du hast das Verse verlassen…</h1>
    <p>Die angeforderte Seite wurde in einem Quantensturm zerstreut oder existiert nicht.</p>
    <a class="btn" href="/">Zurück zum Raumdock</a>
  </main>
</body>
</html>
