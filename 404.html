<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 – Seite nicht gefunden | Raumdock</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <style>
    :root{--bg:#08090c; --fg:#f4f6f8; --muted:#b7beca; --accent:#f6c200}
    *{box-sizing:border-box}
    body{margin:0; min-height:100svh; display:grid; place-items:center; background:#08090c; color:var(--fg); font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Inter,Helvetica,Arial,sans-serif}
    .wrap{max-width:720px; padding:32px 20px; text-align:center}
    h1{font-size:42px; line-height:1.1; margin:0 0 8px}
    p{color:var(--muted)}
    .btn{display:inline-block; margin-top:18px; padding:10px 16px; border-radius:12px; text-decoration:none; color:#00111a; background:linear-gradient(90deg, var(--accent), #ffe585); font-weight:700}
    .art{opacity:.2; width:min(60vw,520px); margin:0 auto 10px; display:block}
  </style>
</head>
<body>
  <main class="wrap">
    <img class="art" src="/assets/astronaut-wolf.png" alt="Astronaut Wolf" />
    <h1>Du hast das Verse verlassen…</h1>
    <p>Die angeforderte Seite wurde in einem Quantensturm zerstreut oder existiert nicht.</p>
    <a class="btn" href="/">Zurück zum Raumdock</a>
  </main>
</body>
</html>
