<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 – Signal verloren | Raumdock</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#04060a" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <style>
    @font-face{font-family:"RDOC Display";src:url("/assets/BebasNeue-Regular.ttf") format("truetype");font-weight:400;font-style:normal;font-display:swap}
    :root{--bg:#04060a;--bg2:#080e14;--fg:#c8dce8;--hi:#eaf4fb;--muted:rgba(200,220,232,.58);--dim:rgba(200,220,232,.34);--cyan:#00d4ff;--gold:#f0a500;--red:#ff4444;--bd:rgba(0,212,255,.18);--bd-hi:rgba(0,212,255,.34);--font-ui:"Segoe UI","Arial Narrow",system-ui,sans-serif;--font-display:"RDOC Display","Arial Narrow",Impact,sans-serif;--font-tech:Consolas,"Cascadia Mono","Lucida Console",monospace}
    *{box-sizing:border-box}
    body{margin:0;min-height:100svh;display:grid;place-items:center;color:var(--fg);font-family:var(--font-ui);
      background:radial-gradient(820px 460px at 50% -8%,rgba(0,212,255,.12),transparent 60%),linear-gradient(180deg,#04060a,#060c14 50%,#04060a),var(--bg)}
    body::after{content:"";position:fixed;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.02) 3px,rgba(0,212,255,.02) 4px)}
    .panel{position:relative;width:min(720px,calc(100% - 36px));padding:40px 34px 34px;background:rgba(8,14,20,.66);border:1px solid var(--bd);
      box-shadow:0 30px 80px rgba(0,0,0,.5);backdrop-filter:blur(4px)}
    /* gold corner ticks — RDOC card chrome */
    .panel .c{position:absolute;width:14px;height:14px;pointer-events:none}
    .panel .tl{top:8px;left:8px;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
    .panel .tr{top:8px;right:8px;border-top:1px solid var(--gold);border-right:1px solid var(--gold)}
    .panel .bl{bottom:8px;left:8px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold)}
    .panel .br{bottom:8px;right:8px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold)}
    .status{display:flex;align-items:center;gap:9px;font-family:var(--font-tech);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red)}
    .status .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .code{margin:14px 0 4px;font-family:var(--font-display);font-size:clamp(84px,20vw,180px);line-height:.82;letter-spacing:4px;color:var(--hi);text-shadow:0 0 46px rgba(0,212,255,.3)}
    .code span{color:var(--cyan)}
    h1{margin:6px 0 10px;font-family:var(--font-display);font-size:clamp(24px,4vw,34px);letter-spacing:1px;text-transform:uppercase;color:var(--hi)}
    p{max-width:54ch;color:var(--muted);line-height:1.6;margin:0 0 8px}
    .rows{margin:20px 0 4px;display:grid;gap:6px;font-family:var(--font-tech);font-size:12px;letter-spacing:.3px}
    .rows .r{display:grid;grid-template-columns:128px 1fr;gap:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
    .rows .k{color:var(--dim);text-transform:uppercase;letter-spacing:1.4px;font-size:10px;align-self:center}
    .rows .v{color:var(--fg)}
    .rows .v.path{color:var(--cyan);word-break:break-all}
    .cta{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;text-decoration:none;font-family:var(--font-tech);font-size:11px;letter-spacing:1.6px;text-transform:uppercase}
    .btn.primary{color:var(--cyan);border:1px solid var(--bd-hi);background:rgba(0,212,255,.05)}
    .btn.primary:hover{background:rgba(0,212,255,.13)}
    .btn.gold{color:var(--gold);border:1px solid rgba(240,165,0,.4);background:rgba(240,165,0,.06)}
    .btn.gold:hover{background:rgba(240,165,0,.13)}
    .art{position:absolute;right:-26px;bottom:-30px;width:min(40vw,300px);opacity:.16;filter:saturate(.8) contrast(1.1);pointer-events:none;z-index:0}
    .panel>*{position:relative;z-index:1}
    .panel .c,.art{z-index:0}
  </style>
</head>
<body>
  <main class="panel">
    <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
    <img class="art" src="/assets/astronaut-wolf.png" alt="" aria-hidden="true" />
    <div class="status"><span class="dot" aria-hidden="true"></span> Signal verloren</div>
    <div class="code">4<span>0</span>4</div>
    <h1>Diese Koordinate ist leer</h1>
    <p>Die angeforderte Seite wurde in einem Quantensturm zerstreut — oder es gab sie nie. Kein Heldentod, einfach umkehren.</p>
    <div class="rows">
      <div class="r"><span class="k">Fehler</span><span class="v">HTTP 404 · Not Found</span></div>
      <div class="r"><span class="k">Sektor</span><span class="v path" id="path">/</span></div>
      <div class="r"><span class="k">Empfehlung</span><span class="v">Rückkehr zum Raumdock</span></div>
    </div>
    <div class="cta">
      <a class="btn primary" href="/">← Zurück zum Raumdock</a>
      <a class="btn gold" href="https://discord.gg/raumdock" target="_blank" rel="noopener">Discord</a>
    </div>
  </main>
  <script>
    var p = document.getElementById('path');
    if (p) p.textContent = (location.pathname + location.search) || '/';
  </script>
</body>
</html>
