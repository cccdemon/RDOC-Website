server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Statische Assets – Long-Cache + immutable.
  # index.html hängt eh ?v=... an die URLs, das fungiert als Cache-Buster.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json font/ttf font/woff2;
    try_files $uri =404;
  }

  # Alles andere wird hier nicht erwartet
  location / { return 404; }
}
