upstream web    { server web:8080; }
upstream assets { server assets:8080; }
upstream api    { server api:8080; }

server {
  listen 8080;
  server_name _;

  location = /healthz {
    access_log off;
    return 200 "proxy-ok\n";
  }

  location /assets/ {
    proxy_pass http://assets;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://web;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
