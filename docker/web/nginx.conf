server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Sicherheits-Header (defensiv, kein CSP da viele Externals)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Healthcheck – wird von K8s livenessProbe / Docker HEALTHCHECK genutzt
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # /assets/* und /api/* gehören in andere Container.
  # Wer hier landet, hat falsches Routing -> 404 statt Loop.
  location /assets/ { return 404; }
  location /api/    { return 404; }

  # HTML-Seiten ausliefern, Pretty-URLs (foo -> foo.html) erlauben
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # HTML niemals lange cachen – kleine HTML-Datei, Änderungen müssen sofort durch
  location ~* \.html$ {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  error_page 404 /404.html;
  location = /404.html { internal; }
}
